name: Split & Publish

concurrency:
  group: split-publish-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      publish_all:
        description: Publish every split repository instead of only changed components
        required: false
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths:
      - 'packages/**'
      - 'plugins/**'
      - 'themes/**'
      - '.github/workflows/split-publish.yml'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.targets }}
      target_count: ${{ steps.targets.outputs.target_count }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve split targets
        id: targets
        run: |
          set -euo pipefail

          PUBLISH_ALL="${{ github.event.inputs.publish_all || 'false' }}"
          BEFORE="$(python3 -c 'import json,os; p=os.environ.get("GITHUB_EVENT_PATH",""); print((json.load(open(p,"r",encoding="utf-8")).get("before","") if p and os.path.exists(p) else ""))' 2>/dev/null || true)"

          if [ -z "${BEFORE:-}" ] || [ "${BEFORE:-}" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
          fi

          collect_all_targets() {
            local root="$1"
            local marker="$2"
            find "$root" -mindepth 3 -maxdepth 3 -type f -name "$marker" -print \
              | sed 's#/'"$marker"'$##' \
              | sort
          }

          collect_changed_targets() {
            if [ -z "${BEFORE:-}" ]; then
              return
            fi

            git diff --name-only "${BEFORE}" HEAD -- packages plugins themes \
              | awk -F/ 'NF >= 3 { print $1 "/" $2 "/" $3 }' \
              | sort -u
          }

          mapfile -t PACKAGE_TARGETS < <(collect_all_targets packages composer.json | awk '{print "package|" $0}')
          mapfile -t PLUGIN_TARGETS < <(collect_all_targets plugins composer.json | awk '{print "plugin|" $0}')
          mapfile -t THEME_TARGETS < <(collect_all_targets themes tentapress.json | awk '{print "theme|" $0}')

          if [ "${PUBLISH_ALL}" != "true" ]; then
            mapfile -t CHANGED_TARGETS < <(collect_changed_targets)

            if [ "${#CHANGED_TARGETS[@]}" -eq 0 ]; then
              echo "No package, plugin, or theme changes detected. Nothing to split."
              {
                echo 'targets=[]'
                echo 'target_count=0'
              } >>"$GITHUB_OUTPUT"
              exit 0
            fi

            declare -A CHANGED_TARGET_MAP=()
            for target in "${CHANGED_TARGETS[@]}"; do
              CHANGED_TARGET_MAP["$target"]=1
            done

            filter_targets() {
              local -a current=("$@")
              local -a filtered=()
              local entry
              local target_path
              for entry in "${current[@]}"; do
                target_path="${entry#*|}"
                if [ -n "${CHANGED_TARGET_MAP[$target_path]:-}" ]; then
                  filtered+=("$entry")
                fi
              done
              printf '%s\n' "${filtered[@]}"
            }

            mapfile -t PACKAGE_TARGETS < <(filter_targets "${PACKAGE_TARGETS[@]}")
            mapfile -t PLUGIN_TARGETS < <(filter_targets "${PLUGIN_TARGETS[@]}")
            mapfile -t THEME_TARGETS < <(filter_targets "${THEME_TARGETS[@]}")
          fi

          mapfile -t TARGETS < <(printf '%s\n' "${PACKAGE_TARGETS[@]}" "${PLUGIN_TARGETS[@]}" "${THEME_TARGETS[@]}" | sed '/^$/d')

          echo "Split targets:"
          echo "- packages: ${#PACKAGE_TARGETS[@]}"
          echo "- plugins: ${#PLUGIN_TARGETS[@]}"
          echo "- themes: ${#THEME_TARGETS[@]}"

          if [ "${#TARGETS[@]}" -eq 0 ]; then
            echo "No split targets matched the changed paths."
            {
              echo 'targets=[]'
              echo 'target_count=0'
            } >>"$GITHUB_OUTPUT"
            exit 0
          fi

          targets_json="$(printf '%s\n' "${TARGETS[@]}" | python3 -c 'import json,sys; print(json.dumps([{"kind": line.split("|",1)[0], "path": line.split("|",1)[1]} for line in sys.stdin.read().splitlines()]))')"

          {
            echo "targets=${targets_json}"
            echo "target_count=${#TARGETS[@]}"
          } >>"$GITHUB_OUTPUT"

  split:
    needs: prepare
    if: needs.prepare.outputs.target_count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Configure git
        run: |
          git config user.name "TentaBot"
          git config user.email "actions@github.com"

      - name: Split and push target
        env:
          SPLIT_TOKEN: ${{ secrets.SPLIT_TOKEN }}
          SPLIT_ORG: ${{ secrets.SPLIT_ORG }}
          SPLIT_PACKAGE_PREFIX: ${{ vars.SPLIT_PACKAGE_PREFIX }}
          SPLIT_PLUGIN_PREFIX: ${{ vars.SPLIT_PLUGIN_PREFIX }}
          SPLIT_THEME_PREFIX: ${{ vars.SPLIT_THEME_PREFIX }}
          TARGET_KIND: ${{ matrix.target.kind }}
          TARGET_PATH: ${{ matrix.target.path }}
        run: |
          set -euo pipefail

          if [ -z "${SPLIT_TOKEN:-}" ]; then
            echo "Missing SPLIT_TOKEN secret (PAT with repo write access)."
            exit 1
          fi

          ORG="${SPLIT_ORG:-${GITHUB_REPOSITORY_OWNER}}"
          PACKAGE_PREFIX="${SPLIT_PACKAGE_PREFIX:-package-}"
          PLUGIN_PREFIX="${SPLIT_PLUGIN_PREFIX:-plugin-}"
          THEME_PREFIX="${SPLIT_THEME_PREFIX:-theme-}"
          BEFORE="$(python3 -c 'import json,os; p=os.environ.get("GITHUB_EVENT_PATH",""); print((json.load(open(p,"r",encoding="utf-8")).get("before","") if p and os.path.exists(p) else ""))' 2>/dev/null || true)"

          if [ -z "${BEFORE:-}" ] || [ "${BEFORE:-}" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse HEAD^ 2>/dev/null || echo '')"
          fi

          read_version_file() {
            local path="$1"
            python3 -c 'import json,sys; p=sys.argv[1]; data=json.load(open(p,"r",encoding="utf-8")); print((data.get("version") or "").strip())' "$path" 2>/dev/null || true
          }

          read_version_stdin() {
            python3 -c 'import json,sys; data=json.load(sys.stdin); print((data.get("version") or "").strip())' 2>/dev/null || true
          }

          split_push() {
            local prefix="$1"
            local repo="$2"
            local branch="main"
            local ref="split-$(echo "$repo" | tr '/' '-' | tr -cd '[:alnum:]-')"

            echo "Splitting ${prefix} -> ${ORG}/${repo}.git" >&2
            git subtree split --prefix="$prefix" -b "$ref" >&2
            local sha
            sha="$(git rev-parse "$ref")"
            git push --force "https://x-access-token:${SPLIT_TOKEN}@github.com/${ORG}/${repo}.git" "$ref":"$branch" >&2
            echo "${sha}"
            git branch -D "$ref" >&2
          }

          tag_version() {
            local repo="$1"
            local version="$2"
            local sha="$3"
            local prev_version="$4"

            if [ -z "${version:-}" ]; then
              return
            fi

            if [ -n "${prev_version:-}" ] && [ "${prev_version}" = "${version}" ]; then
              echo "Version unchanged (${version}) for ${repo}, skipping tag/release."
              return
            fi

            local tag="v${version}"
            local remote="https://x-access-token:${SPLIT_TOKEN}@github.com/${ORG}/${repo}.git"
            local previous_tag

            if git ls-remote --tags "$remote" "refs/tags/${tag}" | grep -q "${tag}"; then
              echo "Tag ${tag} already exists for ${repo}, skipping."
              return
            fi

            previous_tag="$(git ls-remote --tags "$remote" \
              | awk '{print $2}' \
              | sed 's#refs/tags/##' \
              | sed 's#\\^{}##' \
              | sort -V \
              | tail -n 1)"

            git tag -d "${tag}" >/dev/null 2>&1 || true
            git tag -a "${tag}" -m "${repo} ${tag}" "${sha}"
            git push "$remote" "refs/tags/${tag}"
            git tag -d "${tag}"

            local notes_file
            notes_file="$(mktemp)"

            if [ -n "${previous_tag:-}" ]; then
              git fetch "$remote" "refs/tags/${previous_tag}:refs/tags/${previous_tag}" >/dev/null 2>&1 || true
              git log --pretty=format:'- %s (%h)' "${previous_tag}..${sha}" >"$notes_file" 2>/dev/null || true
            else
              git log --pretty=format:'- %s (%h)' -n 50 "${sha}" >"$notes_file" 2>/dev/null || true
            fi

            if [ ! -s "$notes_file" ]; then
              echo "No changes recorded." >"$notes_file"
            fi

            GH_TOKEN="${SPLIT_TOKEN}" gh release create "${tag}" \
              -R "${ORG}/${repo}" \
              -t "${repo} ${tag}" \
              -F "$notes_file" || true

            rm -f "$notes_file"
          }

          name="$(basename "${TARGET_PATH}")"
          case "${TARGET_KIND}" in
            package)
              repo="${PACKAGE_PREFIX}${name}"
              version_file="${TARGET_PATH}/composer.json"
              ;;
            plugin)
              repo="${PLUGIN_PREFIX}${name}"
              version_file="${TARGET_PATH}/tentapress.json"
              ;;
            theme)
              repo="${THEME_PREFIX}${name}"
              version_file="${TARGET_PATH}/tentapress.json"
              ;;
            *)
              echo "Unknown target kind: ${TARGET_KIND}"
              exit 1
              ;;
          esac

          version="$(read_version_file "${version_file}")"
          prev_version=""
          if [ -n "${BEFORE:-}" ]; then
            prev_version="$(git show "${BEFORE}:${version_file}" 2>/dev/null | read_version_stdin || true)"
          fi

          if [ -z "${version:-}" ]; then
            echo "Missing version in ${version_file} for ${repo}."
            exit 1
          fi

          echo "Version for ${repo}: ${version} (prev: ${prev_version:-none})"
          sha="$(split_push "${TARGET_PATH}" "${repo}")"
          tag_version "${repo}" "${version}" "${sha}" "${prev_version}"
